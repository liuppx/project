# feature 受控词表 + 每个 feature 的 chunk 清单骨架
#
# 字段说明:
#   id             feature 受控词表项；frontmatter 的 feature 字段必须取自这里
#   name           中文显示名（仅人读，不进 RAG）
#   scope          主 scope（个别 chunk 可不同）
#   batch          B1-B6，对应 plan §1.6 内容起草批次
#   priority       P0 / P1 / P2
#   chunk_count_est 估算 chunk 数（实际起草时可±20%）
#   owner          认领的 reviewer（待 PM 填）
#   status         pending / drafting / reviewing / done
#   chunks         实际起草后填入的 chunk id 清单（增量）

